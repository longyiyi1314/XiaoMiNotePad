name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass release -keypass release -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tail -300
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Rename APK files for release
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/*.apk release-assets/app-debug.apk
          cp app/build/outputs/apk/release/*.apk release-assets/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body: |
            ## Release Notes
            
            小米平板笔记应用 - 版本 ${{ steps.version.outputs.VERSION }}
            
            ### 功能特性
            - ✅ 小米智能笔支持 (压力感知、手掌抑制)
            - ✅ 备份与回收站
            - ✅ GitHub 私人仓库自动同步
            - ✅ 收藏笔记
            - ✅ 7 种笔型 (圆珠/钢笔/毛笔/马克/高亮/铅笔/橡皮)
            - ✅ 自定义颜色 (13种预设色 + 6种高亮色)
            - ✅ PDF/PPT/Word 文档导入
            - ✅ 笔记文件夹分类
            
            ### 下载
            | 文件 | 说明 |
            |------|------|
            | app-debug.apk | Debug 版本 (包含调试信息) |
            | app-release.apk | Release 版本 (推荐安装) |
          files: release-assets/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
